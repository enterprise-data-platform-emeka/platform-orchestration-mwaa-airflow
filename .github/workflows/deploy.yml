name: Deploy

# Deploys DAGs to the MWAA (Amazon Managed Workflows for Apache Airflow)
# S3 (Simple Storage Service) bucket.
#
# What "deploy" means here:
#   1. Assert MWAA is AVAILABLE — abort if CREATING or UPDATING
#   2. Upload dags/ to s3://edp-{env}-{account_id}-mwaa-dags/dags/
#      MWAA picks up new DAG files within ~30 seconds. That is it.
#
# What this workflow does NOT do:
#   - It never uploads requirements.txt. Terraform owns the MWAA runtime
#     environment including Python packages. To change packages, update
#     modules/orchestration/requirements.txt in terraform-platform-infra-live
#     and run terraform apply.
#   - It never calls aws mwaa update-environment. Package updates are an
#     infrastructure change and go through the Terraform pipeline.
#   - It never touches plugins.zip. That is a permanent empty placeholder
#     created by Terraform and never changed.
#   - It does not manage the dbt project. The platform-dbt-analytics deploy
#     workflow syncs dbt directly to S3. MWAA workers download it at runtime.
#
# MWAA polls the DAGs bucket continuously. New DAG files appear in the UI
# within ~30 seconds of upload. A changed requirements.txt triggers a MWAA
# environment update which takes ~35 minutes. Only change it when necessary.
#
# Triggers:
#   - push to main    → CI completes successfully → automatically deploys to dev
#   - workflow_dispatch → manually deploys to staging or prod
#
# Promotion path: dev (auto) → staging (manual) → prod (manual + approval)
#
# AWS authentication uses OIDC (OpenID Connect), no long-lived access keys
# are stored in GitHub secrets.
#
# Required GitHub configuration:
#   Repository variables:
#     AWS_ACCOUNT_ID: 12-digit AWS account ID
#   Environments: dev, staging, prod (Settings → Environments)
#     staging: add required reviewers
#     prod: add required reviewers + deployment protection rules

on:
  # Triggers only after CI completes successfully on main.
  # This ensures the DAG validates cleanly before reaching production MWAA.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

  # Manual trigger for deploying to staging or prod.
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [dev, staging, prod]

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}

    # When triggered by workflow_run, only proceed if CI actually passed.
    # workflow_dispatch bypasses this check, manual deploys are intentional.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      # id-token: write is required for OIDC authentication to AWS.
      id-token: write
      contents: read

    env:
      ENV: ${{ inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug resolved values
        run: |
          echo "ENV: ${{ env.ENV }}"
          echo "AWS_ACCOUNT_ID set: ${{ vars.AWS_ACCOUNT_ID != '' }}"
          echo "Role ARN: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/edp-${{ env.ENV }}-github-actions-role"

      - name: Configure AWS credentials (OIDC)
        # Assumes the GitHub Actions IAM (Identity and Access Management) role
        # via OIDC. No access keys are stored in GitHub.
        # The role must have s3:PutObject and s3:DeleteObject on the MWAA bucket.
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/edp-${{ env.ENV }}-github-actions-role
          aws-region: eu-central-1

      - name: Resolve AWS account ID
        # Confirm the assumed role and capture the account ID for bucket names.
        id: account
        run: echo "id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Set MWAA S3 bucket name
        id: buckets
        run: |
          ACCOUNT_ID=${{ steps.account.outputs.id }}
          echo "mwaa=edp-${{ env.ENV }}-${ACCOUNT_ID}-mwaa-dags" >> "$GITHUB_OUTPUT"

      - name: Assert MWAA is AVAILABLE
        # Fail fast if MWAA is CREATING or UPDATING. Calling update-environment
        # on top of an in-progress provision queues a second 35-minute update
        # unnecessarily. Re-run this workflow once MWAA reaches AVAILABLE.
        env:
          MWAA_ENV_NAME: edp-${{ env.ENV }}-mwaa
        run: |
          STATUS=$(aws mwaa get-environment \
            --name "${MWAA_ENV_NAME}" \
            --query "Environment.Status" \
            --output text)
          echo "MWAA status: ${STATUS}"
          if [ "${STATUS}" != "AVAILABLE" ]; then
            echo "MWAA environment is ${STATUS}. Deploy aborted."
            echo "Wait for AVAILABLE, then re-run this workflow."
            exit 1
          fi

      # -----------------------------------------------------------------------
      # Upload DAGs
      # -----------------------------------------------------------------------
      # aws s3 sync uploads new or changed files and removes files that were
      # deleted locally. The --delete flag keeps the MWAA bucket in sync with
      # the repo. Stale DAG files are removed automatically.

      - name: Upload dags/ to S3
        run: |
          aws s3 sync dags/ s3://${{ steps.buckets.outputs.mwaa }}/dags/ \
            --delete \
            --exclude "__pycache__/*" \
            --exclude "*.pyc"

      # -----------------------------------------------------------------------
      # Deployment summary
      # -----------------------------------------------------------------------

      - name: Deployment summary
        run: |
          echo ""
          echo "Deployed to MWAA environment: edp-${{ env.ENV }}"
          echo "  dags/ -> s3://${{ steps.buckets.outputs.mwaa }}/dags/"
          echo ""
          echo "DAG changes appear in MWAA within ~30 seconds."
          echo ""
          echo "To change Python packages: update modules/orchestration/requirements.txt"
          echo "in terraform-platform-infra-live and run terraform apply (~35 min)."
          echo "To update dbt models: push to platform-dbt-analytics (S3 sync, seconds)."
