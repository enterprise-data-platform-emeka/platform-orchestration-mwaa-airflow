# docker-compose.yml — EDP local Airflow development environment.
#
# Uses apache/airflow:2.9.2-python3.11 (the same Airflow version as MWAA)
# with requirements.txt installed using the official MWAA 2.9.2 constraints.
#
# Usage:
#   make env   # populate .env with SSO credentials
#   make up    # build image and start Airflow
#   open http://localhost:8080  (admin / test)

services:
  airflow:
    build: .
    # 'standalone' runs the scheduler, webserver, and triggerer in a single
    # process — perfect for local development. No separate worker needed.
    command: standalone

    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAG_FILE_PROCESSOR_TIMEOUT: "120"
      AIRFLOW__WEBSERVER__SECRET_KEY: "local-dev-only-not-for-production"
      AIRFLOW_HOME: /opt/airflow

      # AWS credentials injected from .env (populated by make env).
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      # AWS_SESSION_TOKEN is only present for SSO/temporary credentials.
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-eu-central-1}

      # MWAA_ENV drives Glue job names and dbt target (dev / staging / prod).
      MWAA_ENV: ${MWAA_ENV:-dev}
      AWS_ACCOUNT_ID: ${AWS_ACCOUNT_ID}

    ports:
      - "8080:8080"

    volumes:
      # DAG files — hot-reloaded by the scheduler every 30 seconds.
      - ./dags:/opt/airflow/dags

      # Plugins directory — required by MWAA even when empty.
      - ./plugins:/opt/airflow/plugins

      # dbt project mounted directly — no symlink needed.
      - ../platform-dbt-analytics:/opt/airflow/dbt/platform-dbt-analytics

      # Persist Airflow metadata DB and logs across container restarts.
      - airflow-data:/opt/airflow

    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  airflow-data:
